# build.yml — CI for BusHop
#
# Runs on every push/PR to main:
#   - ./gradlew test (unit + architecture tests)
#   - ./gradlew lint (Android lint with warnings-as-errors)
#   - ./gradlew assembleDebug (verifies compilation)

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: build-test-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Verify CHANGELOG.md has content (PRs)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md is empty or missing" && exit 1
          fi
          if git diff --name-only origin/main...HEAD | grep -q CHANGELOG.md; then
            echo "✅ CHANGELOG.md was updated"
          else
            echo "⚠️  CHANGELOG.md was not modified — consider adding release notes"
          fi
      - name: Run static analysis (detekt)
        run: ./gradlew detekt --no-daemon
      - name: Run all tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Check code formatting (spotless + ktlint)
        run: ./gradlew spotlessCheck --no-daemon
      - name: Run Android lint
        run: ./gradlew lint --no-daemon

      - name: Verify debug build
        run: ./gradlew assembleDebug --no-daemon

      - name: Update static badges from shields.io (main only)
        if: github.ref_name == 'main'
        run: ./gradlew updateBadges -PautoDetect --no-daemon

      - name: Commit updated badge SVGs
        if: github.ref_name == 'main'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "chore: auto-update test count badge [skip ci]"
          file_pattern: docs/badges/*.svg

  gitleaks:
    name: secret-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

