# build.yml — CI for BusHop
#
# Runs on every push/PR to main:
#   - ./gradlew test (unit + architecture tests)
#   - ./gradlew lint (Android lint with warnings-as-errors)
#   - ./gradlew assembleDebug (verifies compilation)

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: build-test-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@b963242bf64c6535d5d8b5b940eaa731d0d2d4e3 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@89af20f47afc6939245cf28647b0f41aa8e77309 # v3.4.2

      - name: Cache Gradle
        uses: actions/cache@1bd1e32a3bae45390e01e0fcc73a7e2bdfe18e6c # v4.2.1
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Verify CHANGELOG.md has content (PRs)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md is empty or missing" && exit 1
          fi
          if git diff --name-only origin/main...HEAD | grep -q CHANGELOG.md; then
            echo "✅ CHANGELOG.md was updated"
          else
            echo "⚠️  CHANGELOG.md was not modified — consider adding release notes"
          fi
      - name: Run static analysis (detekt)
        run: ./gradlew detekt --no-daemon
      - name: Run all tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Check code formatting (spotless + ktlint)
        run: ./gradlew spotlessCheck --no-daemon
      - name: Run Android lint
        run: ./gradlew lint --no-daemon

      - name: Verify debug build
        run: ./gradlew assembleDebug --no-daemon

      - name: Update static badges from shields.io (main only)
        if: github.ref_name == 'main'
        run: ./gradlew updateBadges -PautoDetect --no-daemon

      - name: Commit updated badge SVGs
        if: github.ref_name == 'main'
        uses: stefanzweifel/git-auto-commit-action@e3481035be8e5cfb5a8c3efb81c1e4e0be7e1121 # v5.1.0
        with:
          commit_message: chore: auto-update test count badge [skip ci]
          file_pattern: docs/badges/*.svg

  gitleaks:
    name: secret-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: pr-title-check
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
