# release.yml — Create a GitHub Release with built APK
#
# Trigger: push a tag matching v* (e.g., v1.2.3)
#
# For production signing, set these repository secrets:
#   SIGNING_KEYSTORE_B64  — base64-encoded release keystore
#   SIGNING_KEY_ALIAS     — key alias
#   SIGNING_KEY_PASSWORD  — key password
#   SIGNING_STORE_PASSWORD — store password
# If any are missing, builds a debug APK instead.
#
# Requires: workflows/build.yml must pass first.

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@b963242bf64c6535d5d8b5b940eaa731d0d2d4e3 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@89af20f47afc6939245cf28647b0f41aa8e77309 # v3.4.2

      - name: Cache Gradle
        uses: actions/cache@1bd1e32a3bae45390e01e0fcc73a7e2bdfe18e6c # v4.2.1
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore (if secrets present)
        id: signing
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > app/keystore-ci.jks
            echo "keystore=app/keystore-ci.jks" >> "$GITHUB_OUTPUT"
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        run: |
          if [ "${{ steps.signing.outputs.has_signing }}" = "true" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=app/keystore-ci.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.SIGNING_STORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.SIGNING_KEY_PASSWORD }} \
              --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate APK
        id: apk
        run: |
          apk=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$apk" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$apk")" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${VER}\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "⚠️ No release notes found for ${VER} — using full CHANGELOG"
            cp CHANGELOG.md release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe605939cb35d87cddd99dba51fb7c8170c71 # v2.1.0
        with:
          name: BusHop ${{ github.ref_name }}
          body_path: release-notes.md
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: false
          draft: true
