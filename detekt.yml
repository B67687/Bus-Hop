# detekt config — builds on default-detekt-config; overrides below
# buildUponDefaultConfig is set in build.gradle.kts via the detekt extension
# Thresholds tuned for existing codebase; tighten over time

style:
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 180
  MagicNumber:
    active: false
  ForbiddenComment:
    active: true
  ReturnCount:
    max: 8
  UnusedParameter:
    active: false

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"
  MatchingDeclarationName:
    active: false

complexity:
  LongParameterList:
    functionThreshold: 15
    constructorThreshold: 15
  ComplexCondition:
    threshold: 7
  LargeClass:
    threshold: 800
  LongMethod:
    threshold: 500
  TooManyFunctions:
    thresholdInFiles: 35
    thresholdInClasses: 35
    thresholdInInterfaces: 20
  CyclomaticComplexMethod:
    threshold: 50
  NestedBlockDepth:
    threshold: 6

comments:
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
  TooGenericExceptionThrown:
    active: false
