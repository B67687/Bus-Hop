<path d="M510,395 L535,395" class="e"/>

<!-- Architecture Rules footer -->
<rect x="200" y="503" width="400" height="70" class="bx"/><text x="400" y="523" class="t">Architecture Rules (8 checks)</text>
<text x="400" y="543" class="l">domain/ ❌ no Android deps  |  app/ → domain/ via interface</text>
<text x="400" y="561" class="s">No unused version catalog entries  |  ProGuard matches packages</text>

