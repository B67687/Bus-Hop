<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 595" font-family="Arial,sans-serif" font-size="13">
<defs><marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10Z" fill="#666"/></marker><style>
rect.bx{fill:#e8f4f8;stroke:#4a90d9;stroke-width:1.5;rx:5}rect.i{fill:#d4e8f0;stroke:#4a90d9;stroke-width:1;rx:3}rect.gr{fill:#d4edda;stroke:#5cb85c;stroke-width:1.5;rx:5}rect.or{fill:#fdf0d5;stroke:#f0ad4e;stroke-width:1;rx:3}rect.dc{fill:#f0f0f0;stroke:#999;stroke-width:1;rx:3}text.t{fill:#2c6fa0;font-weight:bold;font-size:14px;text-anchor:middle}text.l{fill:#333;text-anchor:middle;font-size:12px}text.s{fill:#666;text-anchor:middle;font-size:11px}path.e{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#a)}
</style></defs>

<!-- app/ module (4 items, all 22px arrows) -->
